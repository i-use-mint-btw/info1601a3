<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="../assets/(Ghostly) MARK_Filled.png">
    <link rel="stylesheet" href="../style.css">
    <script src="../scripts/login.js" defer type="module"></script>
    </link>
</head>

<style>
    body {
        color: #efdebf;
        background-image: url("../assets/Background_Buildings.png");
        background-repeat: no-repeat;
        height: auto;
        background-size: auto;
        font-family: sans-serif;
    }

    div,
    .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    @media (min-width: 1400px) {
        body {
            background-size: cover;
        }
    }

    .login-container {
        margin-top: 150px;
        min-width: 300px;
        max-width: 400px;
        padding: 30px;
        padding-right: 35px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 10px;
    }

    .login-container > form {
        width: 90%;
        margin: 0 auto;
        display: grid;
        gap: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        outline: none;
    }

    button {
        padding: 10px;
        background-color: #efdebf;
        color: black;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }

    a {
        color: #efdebf;
        cursor: pointer;
        font-size: 14px;
        text-decoration: underline;
    }
</style>

<body>
    <header>
        <nav>
            <ul>
                <li><a class="navigation-link" href="../index.html">Home</a></li>
                <li><a class="navigation-link" href="./items.html">Items</a></li>
                <li><a class="navigation-link" href="./heroes.html">Heroes</a></li>

            </ul>
        </nav>
    </header>

    <main class="main">
        <div class="login-container">
            <form action="">
                <h2>Login</h2>

                <label for="email">Enter your Email:</label>
                <input type="text" placeholder="Email" id="emailInput" />

                <label for="password">Enter your Password:</label>
                <input type="password" placeholder="Password" id="passwordInput" />

                <button type="submit" id="loginButton">Login</button>

                <p style="text-align: center;">
                    Don't have an account?
                    <a href="./signup.html">Sign up</a>
                </p>
            </form>
        </div>
    </main>
</body>

</html>
