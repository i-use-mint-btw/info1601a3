<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="../public/assets/(Gradient) MARK_Filled.png">
    <link rel="stylesheet" href="../style.css">
    </link>
</head>

<style>
    body {
        color: #efdebf;
        background-image: url("../assets/Background_Buildings.png");
        background-repeat: no-repeat;
        height: auto;
        background-size: auto;
        font-family: sans-serif;
    }

    div,
    .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    @media (min-width: 1400px) {
        body {
            background-size: cover;
        }
    }

    .login-container {
        margin-top: 150px;
        width: 300px;
        gap: 18px;
        padding: 25px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 10px;
    }

    input {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        outline: none;
    }

    button {
        padding: 10px;
        background-color: #efdebf;
        color: black;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }

    a {
        color: #efdebf;
        cursor: pointer;
        font-size: 14px;
    }
</style>

<body>
    <header>
        <nav>
            <ul>
                <li><a class="navigation-link" href="../index.html">Home</a></li>
                <li><a class="navigation-link" href="./items.html">Items</a></li>
                <li><a class="navigation-link" href="./heroes.html">Heroes</a></li>

            </ul>
        </nav>
    </header>

    <main class="main">
        <div class="login-container">
            <h2>Login</h2>

            <input type="text" placeholder="Username" />
            <input type="password" placeholder="Password" />

            <button>Login</button>

            <p style="text-align: center;">
                Don't have an account?
                <a href="#">Sign up</a>
            </p>
        </div>
    </main>
</body>

</html>
