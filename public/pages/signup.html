<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="icon" type="image/x-icon" href="../assets/(Ghostly) MARK_Filled.png">
    <link rel="stylesheet" href="../style.css">
    <script src="../scripts/signup.js" defer type="module"></script>
    </link>
</head>

<style>
    body {
        color: #efdebf;
        background-image: url("../assets/Background_Buildings.png");
        background-repeat: no-repeat;
        height: auto;
        background-size: auto;
        font-family: sans-serif;
    }

    div,
    .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    @media (min-width: 1400px) {
        body {
            background-size: cover;
        }
    }

    .signup-container {
        margin-top: 150px;
        min-width: 300px;
        max-width: 400px;
        padding: 30px 35px 30px 30px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 10px;
    }

    .signup-container > form{
        width: 90%;
        margin: 0 auto;
        display: grid;
        gap: 20px;
    }


    input {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        outline: none;
    }

    a {
        color: #efdebf;
        cursor: pointer;
        font-size: 0.875rem;
        text-decoration: underline;
    }

</style>

<body>
    <header>
        <nav>
            <ul>
                <li><a class="navigation-link" href="../index.html">Home</a></li>
                <li><a class="navigation-link" href="./items.html">Items</a></li>
                <li><a class="navigation-link" href="./heroes.html">Heroes</a></li>

            </ul>
        </nav>
    </header>

    <main class="main">
        <div class="signup-container">
            <form action="">
                <h2 style="text-align: center;">Sign Up</h2>

                <label for="username">Create a Username:</label>
                <input type="text" placeholder="Username" id="usernameInput" />

                <label for="email">Enter an Email Address:</label>
                <input type="email" placeholder="Email" id="emailInput" />

                <label for="password">Create a Password:</label>
                <input type="password" placeholder="Password" id="passwordInput" />

                <button class="primary-btn" id="signupButton" style="justify-self: center;">Sign Up</button>

                <p style="text-align: center;">
                    Already have an account?
                    <a href="./login.html">Log in</a>
                </p>
            </form>
        </div>
    </main>
</body>

</html>
