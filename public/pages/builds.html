<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builds</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../assets/(Ghostly) MARK_Filled.png">
    <script src="../scripts/builds.js" defer type="module"></script>
    <style>

			body{
				margin:0px; 
				color: #efdebf;
				background-image: url("../assets/Background_Buildings.png");
				background-repeat: repeat;
				background-size: auto;
			}

			header{
				display: flex;
				flex-direction: row;
				width: 100dvw;
			}
			main{
				display:flex;
				flex-direction: row;
				height: 90dvh;
			}
			#builds-list{
				display: flex;
				flex-direction: column;
				width: 325px;
				border-right: 1px solid #efdebf;
			}

			#build-details{
				display: flex;
				flex-direction: column;
				flex: 1;
				align-items: center;
				justify-content: flex-start;
				}

				.build-card{
					padding: 10px;
					border: 1px solid #efdebf;
					border-radius: 12px;
					display: flex;
					flex-direction: column;
					width: 300px;
					margin-bottom: 5px;
					cursor: pointer;
					
				}

				.build-card:hover{
					background-color: #111314;
				}

				.build-card:active{
					background-color: #111314;
				}

				.build-items{
					display: flex;
					flex-direction: row;
					width: 100%;
					align-items: center;
				}

				.hero-icon-container{
					display: flex;
					flex-direction: row;
					width: 80px;
					justify-content: center;
					align-items: center;
					flex-shrink: 0;
					border-right: 2px solid #efdebf;
				}

				.items-icons-container{
					display: flex;
					flex-direction: row;
					padding-left: 10px;
					align-items: center;
					justify-content: space-between;
					flex: 1;
					height: 100%;
				}


				.preview-box{
					width: 100%;
					max-width: 600px;
					aspect-ratio: 16/9;
					border: 4px solid;
					border-radius: 12px;
					margin-top:20px;
					height: auto;
				}

				img {
					width: 50px;
					border-style: solid 1px black;
					transition: transform 0.3s ease;
				}

				.hero-icon{
					height: auto;
				}


				.create-build-btn{
					flex:1;
					width: 100%;
					padding: 12px;
					border-radius: 12px;
					border: 1px solid #efdebf;
					cursor: pointer;
					background-color: transparent;
					border: none;
					color: #efdebf;
				}



    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a class="navigation-link" href="./heroes.html">Heroes</a></li>
                <li><a class="navigation-link" href="../index.html">Home</a></li>
                <li><a class="navigation-link" href="./items.html">Items</a></li>
                <li><a class="navigation-link" href="./login.html">Log In / Sign Up</a></li>
            </ul>
        </nav> 
    </header>
    
    <main>
        <aside id="builds-list">
					<div class="build-card">
							<div>
								<h2>Build Name</h2>
							</div>
							<div class="build-items">
								<div class="hero-icon-container">
									<img  class ="hero-icon"src="https://assets-bucket.deadlock-api.com/assets-api-res/images/heroes/bull_vertical.png">
								</div>
								<div class="items-icons-container">
									<img src="https://assets-bucket.deadlock-api.com/assets-api-res/images/upgrades/mods_weapon/targeted_silence.png">
									<img src="https://assets-bucket.deadlock-api.com/assets-api-res/images/upgrades/mods_weapon/targeted_silence.png">
									<img src="https://assets-bucket.deadlock-api.com/assets-api-res/images/upgrades/mods_weapon/targeted_silence.png">
								</div>
							</div>
					</div>
					<div class="build-card">
							<div>
								<h2>Build Name</h2>
							</div>
							<div class="build-items">
								<div class="hero-icon-container">
									<img  class ="hero-icon"src="https://assets-bucket.deadlock-api.com/assets-api-res/images/heroes/bull_vertical.png">
								</div>
								<div class="items-icons-container">
									<img src="https://assets-bucket.deadlock-api.com/assets-api-res/images/upgrades/mods_weapon/targeted_silence.png">
									<img src="https://assets-bucket.deadlock-api.com/assets-api-res/images/upgrades/mods_weapon/targeted_silence.png">
									<img src="https://assets-bucket.deadlock-api.com/assets-api-res/images/upgrades/mods_weapon/targeted_silence.png">
								</div>
							</div>
					</div>
					<div class="build-card">
						<button class="create-build-btn">Create New Build +</button>
					</div>
					
        </aside>
        <section id="build-details">
					<div class="preview-box"></div>
        </section>
    </main>
</body>

</html>
