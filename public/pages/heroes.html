<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroes</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../assets/(Ghostly) MARK_Filled.png">
    </link>
    <script src="../scripts/heroes.js" defer type="module"></script>
</head>
<style>
    body {
        color: #efdebf;
        background-image: url("../assets/Background_Buildings.png");
        background-repeat: repeat;
        background-size: auto;
        overflow-x: hidden;
    }

    div,
    .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .main-heroes-div {
        gap: 15px;
        width: 80%;
        background-color: #222021e7;
        border-radius: 25px;
        margin-bottom: 25px;
    }

    .cards {
        height: auto;
        display: flex;
        flex-direction: row;
        gap: 40px;
        flex-wrap: wrap;
    }

    img {
        width: 90px;
        border-radius: 15px;
        border-style: solid;
        transition: transform 0.3s ease;
    }

    img:hover {
        cursor: pointer;
        transform: scale(1.1);
    }

    .heroLore{
        display: flex; 
        flex-direction: row; 
        justify-items: flex-start; 
        align-items: flex-start;
        margin: 0px;
        margin-top: 15px;
    }
    .heroLore p {
        font-size: 1.2rem;
    }

    @media (max-width: 768px) {
        body {
            background-size: cover;
        }
        .cards{
            gap: 15px;
        }
        .main-heroes-div{
            width: 85%;
        }
        .heroLore{
            flex-direction: column;
        }
        .heroLore p {
            font-size: .8rem;
        }
        .heroLore img {
            display: none;
        }
    }
</style>

<body>
    <header>
        <nav>
            <ul>
                <li><a class="navigation-link" href="./items.html">Items</a></li>
                <li><a class="navigation-link" href="../index.html">Home</a></li>
                <li><a class="navigation-link" href="./login.html">Log In / Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main style="margin-top: 80px;" class="main" >
        <div class="main-heroes-div" style="padding-bottom: 1.5rem;">

            <h1 style="font-size: 4rem; margin-top: 20px;">Heroes</h1>
            <div style="display: flex; flex-direction: row; margin-bottom: 2rem;">
                <input id="heroSearch" placeholder="Search By Name" style="height: 20px; width: 120px; padding: 10px;">
            </div>
            
            <div id="modal" class="modal-class">
                <div class="modal-content"></div>
            </div>
            <div class="cards"></div>
        </div>
    </main>
</body>
</html>
