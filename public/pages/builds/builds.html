<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Builds</title>
	<link rel="stylesheet" href="../../style.css">
	<link rel="stylesheet" href="./builds.css">
	<link rel="icon" type="image/x-icon" href="../../assets/(Ghostly) MARK_Filled.png">
	<script src="./builds.js" defer type="module"></script>
	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#3f5d4d">
	<script src="../../scripts/register-sw.js" defer></script>
</head>

<body>
	<header>
		<nav>
			<ul>
				<li><a class="navigation-link" href="../../index.html">Home</a></li>
				<li><a class="navigation-link" href="../items/items.html">Items</a></li>
				<li><a class="navigation-link" href="../heroes/heroes.html">Heroes</a></li>
				<li><a class="navigation-link" href="../builds/builds.html">My Builds</a></li>
				<li><a class="navigation-link" href="../login/login.html">Log in / sign up</a></li>
			</ul>
		</nav>
	</header>

	<main>
		<aside id="builds-list"></aside>

		<section id="build-details">
			<div class="preview-box">
				<h2>Select a build</h2>
			</div>
		</section>

		<section id="modal-form" class="modal-class">
			<div class="modal-content">
				<form>
					<h2>Create Build</h2>

					<div class="form-row">
						<label for="buildName">
							Create a Build Name:
						</label>
						<input type="text" class="form-input" placeholder="Build Name" id="buildName" autocomplete="off">
					</div>
					<div class="form-row">
						<label for="heroSelection">Select a Hero:</label>
						<div class="dropdown">
							<input type="text" id="searchBox" class="form-input" placeholder="Search..." autocomplete="off" />
							<div id="dropdownList" class="dropdown-list"></div>
						</div>
					</div>
					<div class="form-row">
						<div class="item-column">
							<h3>Spirit</h3>
							<input class="form-input" type="text" placeholder="Search Spirit Items"
								id="spiritSearchBox" autocomplete="off">
							<div class="dropdown-list" id="spiritDropdownList"></div>
							<ul class="item-slots" id="spiritUnorderedList">
							</ul>
						</div>
						<div class="item-column">
							<h3>Vitality</h3>
							<input class="form-input" type="text" placeholder="Search Vitality Items"
								id="vitalitySearchBox" autocomplete="off">
							<div class="dropdown-list" id="vitalityDropdownList"></div>
							<ul class="item-slots" id="vitalityUnorderedList">
						</div>
						<div class="item-column">
							<h3>Weapons</h3>
							<input type="text" class="form-input" placeholder="Search Weapon Items"
								id="weaponSearchBox" autocomplete="off">
							<div class="dropdown-list" id="weaponDropdownList"></div>
							<div class="item-slots" id="weaponUnorderedList">
							</div>
						</div>
					</div>
					<div class="form-buttons-container">
						<button id="close" class="form-btn" onclick="hideCreateBuildModal()"> X</button>
						<button id="save-build" class="form-btn">Save Build</button>
					</div>
				</form>
			</div>

		</section>
	</main>
</body>

</html>
