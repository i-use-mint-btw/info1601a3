<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../assets/(Ghostly) MARK_Filled.png">
    </link>
    <script src="../scripts/items.js" defer type="module"></script>
</head>
<style>
    body {
        color: #efdebf;
        background-image: url("../assets/Background_Buildings.png");
        background-repeat: repeat;
        background-size: auto;
        overflow-x: hidden;
    }

    div,
    .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .main-items-div {
        gap: 15px;
        width: 80%;
        background-color: #222021e7;
        border-radius: 25px;
        margin-bottom: 25px;
        padding-bottom: 15px;
    }

    .cards {
        height: auto;
        display: flex;
        flex-direction: row;
        gap: 40px;
        flex-wrap: wrap;
    }

    img {
        width: 90px;
        border-radius: 15px;
        border-style: solid;
        transition: transform 0.3s ease;
    }

    .sorting-select-controls{
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    label{
        font-size: 1.2rem;
        margin-top: 20px;
    }

    select{
        background-color: #ddd;
        color: #222021e7;
        font-size: 1rem;
        border-radius: 8px;
        padding: 10px; 
    }

    .item-card:hover {
        cursor: pointer;
        transform: scale(1.1);
    }

    .itemDesc{
        display: flex; 
        flex-direction: row; 
        justify-items: flex-start; 
        align-items: flex-start;
        margin: 0px;
        margin-top: 15px;
    }
    .itemDesc p {
        font-size: 1.2rem;
    }
    
    h1{
        font-size: 3rem;
        margin-bottom: 30px;
        margin-top: 40px;
    }

    .modal-content{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    @media (max-width: 768px) {
        body {
            background-size: cover;
        }
        .cards{
            gap: 15px;
        }
        .main-heroes-div{
            width: 85%;
        }
        .itemDesc{
            flex-direction: column;
        }
        .itemDesc p {
            font-size: .8rem;
        }
        .itemDesc img {
            display: none;
        }
    }

    svg {
    width: 1em !important;
    height: 1em !important;
    vertical-align: middle;
    }
</style>

<body>
    <header>
        <nav>
            <ul>
                <li><a class="navigation-link" href="./heroes.html">Heroes</a></li>
                <li><a class="navigation-link" href="../index.html">Home</a></li>
                <li><a class="navigation-link" href="./builds.html">Builds</a></li>
                <li><a class="navigation-link" href="./login.html">Log In / Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main style="margin-top: 80px;" class="main" >
        <div class="main-items-div">

            <h1 style="font-size: 4rem; margin-top: 20px;">Items</h1>
            <div style="display: flex; flex-direction: column; margin-bottom: 2rem;">
                <input id="itemSearch" placeholder="Search By Name" style="height: 20px; width: 120px; padding: 10px;">
                <div class="sorting-select-controls">
                    <label for="item-Category">Sort By Item Category:</label>
                    <select id="item-Category">
                        <option>Spirit</option>
                        <option>Vitality</option>
                        <option>Weapon</option>
                    </select>
                </div>
                
            </div>
            <div class="sorting-select-controls">
        
            </div>
            
            <div id="modal" class="modal-class">
                <div class="modal-content"></div>
            </div>
            <div>
                <h1 style="margin-top: 0px;" id="t1H">Tier 1</h1>
                    <div class="cards-tier-1 cards">
                        <div class="item-card">
                            
                        </div>
                    </div>
                <h1 id="t2H">Tier 2</h1>
                    <div class="cards-tier-2 cards"></div>
                <h1 id="t3H">Tier 3</h1>
                    <div class="cards-tier-3 cards"></div>
                <h1 id="t4H">Tier 4</h1>
                    <div class="cards-tier-4 cards"></div>
            </div>
            
        </div>
    </main>
</body>
</html>
