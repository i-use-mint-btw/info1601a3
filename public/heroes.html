<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroes</title>
    <link rel="stylesheet" href="style.css"></link>
    <script src="main.js" defer></script>
</head>
<style>
    body {
    color: #efdebf;
    background-image: url("../assets/Background_Buildings.png");
    background-repeat: no-repeat;
    height: auto;
    background-size: auto;
    }
    div, .main{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    @media (min-width: 1400px) {
        body {
            background-size: cover;
        }
    }
    .main-heroes-div{
      gap: 15px; 
      width: 80%; 
      background-color: #222021e7;
      border-radius: 25px;
    }
    .cards{
      height: auto;
      display: flex;
      flex-direction: row;
      gap: 40px;
      flex-wrap: wrap;
    } 
    img{
      width: 90px; 
      border-radius: 15px; 
      border-style: solid;
      transition: transform 0.3s ease;
    }
    img:hover{
      cursor: pointer;
      transform: scale(1.1);
    }
</style>
<body>
    <nav>
        <h3>Items</h3>
        <h3>Heroes</h3>
        <h3>Sign Up/Log In</h3>
    </nav>
    <main style="margin-top: 80px;" class="main">
        <div class="main-heroes-div">

            <h1>Heroes</h1>
            <div style="display: flex; flex-direction: row;">
              <input><button>Search</button>
            </div>

            <div class="cards"></div>
        </div>
    </main>
    </div>
</body>
<script src="heroes.js" type="module"></script>
</html>
